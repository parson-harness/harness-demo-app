{{- if .Values.dockercfg }}
---
apiVersion: v1
kind: Secret
metadata:
  name: "{{.Values.name}}-dockercfg"
  namespace: {{.Values.namespace}}
  annotations:
    harness.io/skip-versioning: "true"
data:
  .dockercfg: {{ .Values.dockercfg }}
type: kubernetes.io/dockercfg
{{- end }}
{{- if .Values.env.config }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{.Values.name}}-app-config"
  namespace: {{.Values.namespace}}
data:
{{ .Values.env.config | toYaml | indent 2 }}
{{- end }}
{{- if .Values.env.secrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: "{{.Values.name}}-app-secrets"
  namespace: {{.Values.namespace}}
type: Opaque
stringData:
{{ .Values.env.secrets | toYaml | indent 2 }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Values.name}}-deployment
  namespace: {{.Values.namespace}}
  labels:
    app: {{.Values.name}}
    {{- if .Values.service_identifier }}
    harness.io/serviceIdentifier: {{ .Values.service_identifier | quote }}
    {{- end }}
    {{- if .Values.env_identifier }}
    harness.io/envIdentifier: {{ .Values.env_identifier | quote }}
    {{- end }}
spec:
  replicas: {{int .Values.replicas}}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: {{.Values.name}}
  template:
    metadata:
      labels:
        app: {{.Values.name}}
        {{- if .Values.service_identifier }}
        harness.io/serviceIdentifier: {{ .Values.service_identifier | quote }}
        {{- end }}
        {{- if .Values.env_identifier }}
        harness.io/envIdentifier: {{ .Values.env_identifier | quote }}
        {{- end }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      {{- if .Values.dockercfg }}
      imagePullSecrets:
        - name: {{.Values.name}}-dockercfg
      {{- end }}
      containers:
        - name: {{.Values.name}}
          image: {{ .Values.image | quote }}
          imagePullPolicy: Always
          {{- if or .Values.env.config .Values.env.secrets }}
          envFrom:
            {{- if .Values.env.config }}
            - configMapRef:
                name: {{.Values.name}}-app-config
            {{- end }}
            {{- if .Values.env.secrets }}
            - secretRef:
                name: {{.Values.name}}-app-secrets
            {{- end }}
          {{- end }}
          ports:
            - containerPort: {{int .Values.containerPort}}
              name: http
          env:
            - name: APP_NAME
              value: "{{ .Values.appName }}"
            - name: APP_VERSION
              value: "{{ .Values.appVersion }}"
            - name: CUSTOMER_NAME
              value: "{{ .Values.customerName }}"
            - name: CUSTOMER_LOGO
              value: "{{ .Values.customerLogo }}"
            - name: BUILD_ID
              value: "{{ .Values.build_id }}"
            - name: DEPLOYMENT_VARIANT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['harness.io/color']
            - name: DEPLOYMENT_TRACK
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['harness.io/track']
            - name: APP_ENVIRONMENT
              value: "{{ .Values.env_identifier }}"
            - name: DEPLOYMENT_TARGET
              value: "kubernetes"
            - name: DEPLOYMENT_STRATEGY
              value: "{{ .Values.deploymentStrategy }}"
            - name: PUBLIC_URL
              value: "{{ .Values.publicUrl }}"
            - name: STAGE_URL
              value: "{{ .Values.stageUrl }}"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CHAOS_ENABLED
              value: "{{.Values.chaosEnabled}}"
            - name: CHAOS_LATENCY_MS
              value: "{{.Values.chaosLatencyMs}}"
            - name: CHAOS_ERROR_RATE
              value: "{{.Values.chaosErrorRate}}"
          resources:
            requests:
              memory: {{.Values.resources.requests.memory}}
              cpu: {{.Values.resources.requests.cpu}}
            limits:
              memory: {{.Values.resources.limits.memory}}
              cpu: {{.Values.resources.limits.cpu}}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{int .Values.containerPort}}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{int .Values.containerPort}}
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{.Values.name}}-service
  namespace: {{.Values.namespace}}
  labels:
    app: {{.Values.name}}
  annotations:
    harness.io/primary-service: "true"
spec:
  type: {{.Values.serviceType}}
  ports:
    - port: {{int .Values.servicePort}}
      targetPort: {{int .Values.containerPort}}
      protocol: TCP
      name: http
  selector:
    app: {{.Values.name}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{.Values.name}}-service-stage
  namespace: {{.Values.namespace}}
  labels:
    app: {{.Values.name}}
  annotations:
    harness.io/stage-service: "true"
spec:
  type: {{.Values.serviceType}}
  ports:
    - port: {{int .Values.servicePort}}
      targetPort: {{int .Values.containerPort}}
      protocol: TCP
      name: http
  selector:
    app: {{.Values.name}}
